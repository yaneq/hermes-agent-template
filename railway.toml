[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/app/start.sh"
# No healthcheckPath: this fork runs the Slack/messaging gateway as the main
# process and exposes no HTTP server. Railway supervises via the restart
# policy — gateway exit = container exit = restart.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
